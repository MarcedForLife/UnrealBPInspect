[package]
name = "unreal-bp-inspect"
version = "0.1.0"
edition = "2021"
description = "Extract readable structure and logic from Unreal Engine Blueprint .uasset files"
license = "MIT"
readme = "README.md"

[[bin]]
name = "bp-inspect"
path = "src/main.rs"

[dependencies]
clap = { version = "4.5.60", features = ["derive"] }
serde_json = "1.0.149"
